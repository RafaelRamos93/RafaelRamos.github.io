<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>CV Digital</title>
  <script>
    // Redirect para Single Page Application en GitHub Pages
    // Convierte la ruta en un query parameter que index.html procesa
    const pathSegmentsToKeep = 1; // 1 si tu repo es usuario.github.io/cv-digital
    const l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>

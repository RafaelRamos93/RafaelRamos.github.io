name: 🚀 Deploy CV Digital

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    name: 📦 Build
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      # ✅ CORREGIDO: base-href es / porque es repo de usuario
      - name: 🔨 Build
        run: npx ng build --base-href=/

      # ✅ Debug: ver qué se generó
      - name: 📋 List build output
        run: |
          echo "=== dist/ ==="
          ls -la dist/
          echo "=== buscando index.html ==="
          find dist/ -name "index.html" -type f

      # ✅ Copiar 404.html — ajustar ruta según lo que muestre el debug
      - name: 📄 Create 404.html
        run: |
          INDEX_PATH=$(find dist/ -name "index.html" -type f | head -1)
          DIST_DIR=$(dirname "$INDEX_PATH")
          cp "$INDEX_PATH" "$DIST_DIR/404.html"
          echo "Output directory: $DIST_DIR"
          echo "DIST_DIR=$DIST_DIR" >> $GITHUB_ENV

      - name: ⚙️ Setup Pages
        uses: actions/configure-pages@v5

      # ✅ Subir artefacto — ruta dinámica
      - name: 📤 Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.DIST_DIR }}

  deploy:
    name: 🌐 Deploy
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
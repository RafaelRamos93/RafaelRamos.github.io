name: 🚀 Deploy CV Digital

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    name: 📦 Build
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔨 Build
        run: npx ng build --base-href=/cv-digital/

      # ✅ Listar archivos para debug (puedes quitarlo después)
      - name: 📋 List build output
        run: |
          echo "=== Contenido de dist/ ==="
          ls -la dist/
          echo "=== Contenido de dist/cv-digital/ ==="
          ls -la dist/cv-digital/ || echo "No existe dist/cv-digital/"
          echo "=== Contenido de dist/cv-digital/browser/ ==="
          ls -la dist/cv-digital/browser/ || echo "No existe dist/cv-digital/browser/"

      # ✅ Copiar index.html como 404.html para SPA routing
      - name: 📄 Create 404.html
        run: cp dist/cv-digital/browser/index.html dist/cv-digital/browser/404.html

      # ✅ Configurar GitHub Pages
      - name: ⚙️ Setup Pages
        uses: actions/configure-pages@v5

      # ✅ Subir artefacto — RUTA CORRECTA
      - name: 📤 Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/cv-digital/browser

  deploy:
    name: 🌐 Deploy
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
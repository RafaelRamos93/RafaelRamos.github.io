<div class="floating-settings">

  <!-- ═══════════════════════════════════════ -->
  <!--  TOGGLE DE TEMA                        -->
  <!-- ═══════════════════════════════════════ -->
  <div class="toggle-wrapper">
    <div class="tooltip">
      <span class="tooltip__text tooltip__text--dark">
        {{ themeService.isDark() ? 'Light mode' : 'Dark mode' }}
      </span>
      <span class="tooltip__arrow"></span>
    </div>

    <label class="toggle" aria-label="Toggle theme">
      <input
        type="checkbox"
        [checked]="themeService.isDark()"
        (change)="toggleTheme()"
      />
      <span class="toggle__track">
        <span class="toggle__knob">
          <svg class="toggle__icon toggle__icon--moon" viewBox="0 0 24 24" fill="none">
            <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z" fill="currentColor"/>
          </svg>
          <svg class="toggle__icon toggle__icon--sun" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="5" fill="currentColor"/>
            <path d="M12 1v3M12 20v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M1 12h3M20 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"
              stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </span>
      </span>
    </label>
  </div>

  <!-- ═══════════════════════════════════════ -->
  <!--  TOGGLE DE IDIOMA                      -->
  <!-- ═══════════════════════════════════════ -->
  <div class="toggle-wrapper">
    <div class="tooltip">
      <span class="tooltip__text">
        {{ translateService.currentLang() === 'es' ? 'Switch to English' : 'Cambiar a Español' }}
      </span>
      <span class="tooltip__arrow"></span>
    </div>

    <label class="toggle" aria-label="Toggle language">
      <input
        type="checkbox"
        [checked]="translateService.currentLang() === 'en'"
        (change)="toggleLanguage()"
      />
      <span class="toggle__track">
        <span class="toggle__knob toggle__knob--flag">
          <span class="toggle__flag toggle__flag--mx">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <clipPath id="mxClip"><circle cx="12" cy="12" r="11"/></clipPath>
              <g clip-path="url(#mxClip)">
                <rect x="0" y="0" width="8" height="24" fill="#006341"/>
                <rect x="8" y="0" width="8" height="24" fill="#FFFFFF"/>
                <rect x="16" y="0" width="8" height="24" fill="#CE1126"/>
                <circle cx="12" cy="11" r="3" fill="#006341" opacity="0.5"/>
                <circle cx="12" cy="11" r="1.5" fill="#A87B51" opacity="0.6"/>
              </g>
            </svg>
          </span>
          <span class="toggle__flag toggle__flag--us">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <clipPath id="usClip"><circle cx="12" cy="12" r="11"/></clipPath>
              <g clip-path="url(#usClip)">
                <rect x="0" y="0" width="24" height="24" fill="#FFFFFF"/>
                <rect x="0" y="0" width="24" height="1.85" fill="#B22234"/>
                <rect x="0" y="3.7" width="24" height="1.85" fill="#B22234"/>
                <rect x="0" y="7.4" width="24" height="1.85" fill="#B22234"/>
                <rect x="0" y="11.1" width="24" height="1.85" fill="#B22234"/>
                <rect x="0" y="14.8" width="24" height="1.85" fill="#B22234"/>
                <rect x="0" y="18.5" width="24" height="1.85" fill="#B22234"/>
                <rect x="0" y="22.2" width="24" height="1.85" fill="#B22234"/>
                <rect x="0" y="0" width="10" height="13" fill="#3C3B6E"/>
                <circle cx="2.5" cy="2.5" r="0.7" fill="white"/>
                <circle cx="5" cy="2.5" r="0.7" fill="white"/>
                <circle cx="7.5" cy="2.5" r="0.7" fill="white"/>
                <circle cx="3.75" cy="4.5" r="0.7" fill="white"/>
                <circle cx="6.25" cy="4.5" r="0.7" fill="white"/>
                <circle cx="2.5" cy="6.5" r="0.7" fill="white"/>
                <circle cx="5" cy="6.5" r="0.7" fill="white"/>
                <circle cx="7.5" cy="6.5" r="0.7" fill="white"/>
                <circle cx="3.75" cy="8.5" r="0.7" fill="white"/>
                <circle cx="6.25" cy="8.5" r="0.7" fill="white"/>
                <circle cx="2.5" cy="10.5" r="0.7" fill="white"/>
                <circle cx="5" cy="10.5" r="0.7" fill="white"/>
                <circle cx="7.5" cy="10.5" r="0.7" fill="white"/>
              </g>
            </svg>
          </span>
        </span>
      </span>
    </label>
  </div>

</div>
